PLG_SYSTEM_IMAGEKIT="System - ImageKit"
PLG_SYSTEM_IMAGEKIT_XML_DESCRIPTION="Serves local images through the ImageKit.io CDN with automatic srcset, WebP/AVIF conversion, and quality optimisation. Provides upload and media-library management via the ImageKit API."

; -----------------------------------------------------------------------
; Fieldset labels
; -----------------------------------------------------------------------
PLG_SYSTEM_IMAGEKIT_FIELDSET_BASIC="ImageKit connection"
PLG_SYSTEM_IMAGEKIT_FIELDSET_TRANSFORM="Default image settings"
PLG_SYSTEM_IMAGEKIT_FIELDSET_USAGE="Per-image overrides &amp; CSS backgrounds"

; -----------------------------------------------------------------------
; Connection fieldset
; -----------------------------------------------------------------------
PLG_SYSTEM_IMAGEKIT_URL_ENDPOINT_LABEL="URL endpoint"
PLG_SYSTEM_IMAGEKIT_URL_ENDPOINT_DESC="Your ImageKit URL endpoint. Found in the ImageKit dashboard under Developer options. Example: https://ik.imagekit.io/momentsuntil"

PLG_SYSTEM_IMAGEKIT_PUBLIC_KEY_LABEL="Public key"
PLG_SYSTEM_IMAGEKIT_PUBLIC_KEY_DESC="Your ImageKit public API key. Required for client-side upload widgets and signed URL verification."

PLG_SYSTEM_IMAGEKIT_PRIVATE_KEY_LABEL="Private key"
PLG_SYSTEM_IMAGEKIT_PRIVATE_KEY_DESC="Your ImageKit private API key. Required for server-side uploads, signed URLs and media library management (list, delete). Keep this secret — never expose it in front-end code."

; -----------------------------------------------------------------------
; Transform fieldset
; -----------------------------------------------------------------------
PLG_SYSTEM_IMAGEKIT_QUALITY_LABEL="Output quality"
PLG_SYSTEM_IMAGEKIT_QUALITY_DESC="Default JPEG/WebP output quality applied to every image (1–100). A value of 80 is a good balance between file size and visual quality."

PLG_SYSTEM_IMAGEKIT_SRCSET_WIDTHS_LABEL="Default srcset widths (px)"
PLG_SYSTEM_IMAGEKIT_SRCSET_WIDTHS_DESC="Comma-separated list of pixel widths used when building the srcset attribute for every &lt;img&gt; tag. The browser picks whichever width best matches the viewport and device pixel ratio. Example: 320,480,768,1024,1280,1600"

PLG_SYSTEM_IMAGEKIT_DEFAULT_SIZES_LABEL="Default sizes attribute"
PLG_SYSTEM_IMAGEKIT_DEFAULT_SIZES_DESC="Value written to the HTML sizes attribute when the &lt;img&gt; tag does not already have one. &lt;code&gt;100vw&lt;/code&gt; means the image spans the full viewport width. Use a CSS media-query expression for images that are narrower, e.g. &lt;code&gt;(max-width: 768px) 100vw, 50vw&lt;/code&gt;"

; -----------------------------------------------------------------------
; Usage fieldset — note field labels
; -----------------------------------------------------------------------
PLG_SYSTEM_IMAGEKIT_NOTE_SRCSET_OVERRIDE_LABEL="Override srcset widths per image"
PLG_SYSTEM_IMAGEKIT_NOTE_SRCSET_OVERRIDE_DESC="<p>Add <code>data-ik-widths</code> to any &lt;img&gt; tag to use a different set of breakpoints for that image instead of the plugin default. The attribute is stripped from the HTML before it reaches the browser.</p><p><strong>Full-width hero — large breakpoints:</strong></p><pre>&lt;img src=\"/images/header.jpg\"\n     width=\"1920\" height=\"600\"\n     data-ik-widths=\"768,1024,1280,1600,1920\"\n     sizes=\"100vw\"&gt;</pre><p><strong>Blog-card thumbnail — small breakpoints:</strong></p><pre>&lt;img src=\"/images/article.jpg\"\n     width=\"600\" height=\"400\"\n     data-ik-widths=\"320,480,768\"\n     sizes=\"(max-width: 768px) 100vw, 33vw\"&gt;</pre>"

PLG_SYSTEM_IMAGEKIT_NOTE_SIZES_OVERRIDE_LABEL="Override the sizes attribute per image"
PLG_SYSTEM_IMAGEKIT_NOTE_SIZES_OVERRIDE_DESC="<p>Add a <code>sizes</code> attribute directly to any &lt;img&gt; tag and the plugin will leave it untouched. This tells the browser how wide the image will actually be rendered, so it picks the most appropriate srcset entry.</p><p><strong>Examples:</strong></p><ul><li><code>sizes=\"100vw\"</code> — image spans the full viewport (default)</li><li><code>sizes=\"(max-width: 768px) 100vw, 50vw\"</code> — full width on mobile, half width on desktop</li><li><code>sizes=\"(max-width: 576px) 100vw, (max-width: 992px) 50vw, 33vw\"</code> — three-column grid</li></ul>"

PLG_SYSTEM_IMAGEKIT_NOTE_CSS_BG_LABEL="CSS background images"
PLG_SYSTEM_IMAGEKIT_NOTE_CSS_BG_DESC="<p>CSS <code>background-image</code> properties cannot use <code>srcset</code>. Use ImageKit transformation URLs directly in your stylesheet with <code>image-set()</code> for basic resolution switching, or <code>@media</code> queries for full breakpoint control.</p><p><strong>Resolution switching with image-set():</strong></p><pre>.hero {\n    background-image: image-set(\n        url(\"https://ik.imagekit.io/momentsuntil/tr:w-768,f-auto/images/header.jpg\")  1x,\n        url(\"https://ik.imagekit.io/momentsuntil/tr:w-1536,f-auto/images/header.jpg\") 2x\n    );\n}</pre><p><strong>Breakpoint control with @media:</strong></p><pre>.hero {\n    background-image: url(\"https://ik.imagekit.io/momentsuntil/tr:w-768,f-auto/images/header.jpg\");\n}\n@media (min-width: 1024px) {\n    .hero {\n        background-image: url(\"https://ik.imagekit.io/momentsuntil/tr:w-1280,f-auto/images/header.jpg\");\n    }\n}\n@media (min-width: 1440px) {\n    .hero {\n        background-image: url(\"https://ik.imagekit.io/momentsuntil/tr:w-1920,f-auto/images/header.jpg\");\n    }\n}</pre>"
