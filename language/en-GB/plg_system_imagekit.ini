PLG_SYSTEM_IMAGEKIT="System - ImageKit"
PLG_SYSTEM_IMAGEKIT_XML_DESCRIPTION="Serves local images, videos and (optionally) static assets through the ImageKit.io CDN with automatic srcset, WebP/AVIF conversion, and quality optimisation."

